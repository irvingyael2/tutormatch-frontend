<section class="admin-page">
  <div class="admin-header">
    <div>
      <h1>Panel de Avisos</h1>
      <p>Publica anuncios oficiales que verán todos los usuarios.</p>
    </div>
  </div>

  <div class="admin-card">
    <form (ngSubmit)="guardarAviso()">
      <div class="form-grid">
        <div class="form-group">
          <label for="titulo">Título</label>
          <input
            id="titulo"
            name="titulo"
            [(ngModel)]="formulario.titulo"
            required
            placeholder="Ej. Mantenimiento programado"
          />
        </div>

        <div class="form-group">
          <label for="mensaje">Mensaje</label>
          <textarea
            id="mensaje"
            name="mensaje"
            [(ngModel)]="formulario.mensaje"
            rows="4"
            required
            placeholder="Escribe el contenido del aviso"
          ></textarea>
        </div>
      </div>

      <button class="btn-primary" type="submit" [disabled]="cargando">
        {{ editandoId ? 'Actualizar aviso' : 'Crear aviso' }}
      </button>
      <button
        type="button"
        class="btn-secondary"
        *ngIf="editandoId"
        (click)="editandoId = null; formulario = { titulo: '', mensaje: '' }"
      >
        Cancelar edición
      </button>
    </form>
  </div>

  <div class="avisos-list">
    <h2>Últimos avisos</h2>
    <div *ngIf="avisos.length === 0" class="empty-state">
      No hay avisos por el momento.
    </div>

    <div *ngFor="let aviso of avisos" class="aviso-card">
      <div class="aviso-content">
        <strong>{{ aviso.titulo }}</strong>
        <p>{{ aviso.mensaje }}</p>
        <span class="aviso-date">{{ aviso.creadoEn | date:'short' }}</span>
      </div>
      <div class="aviso-actions">
        <button type="button" class="btn-tertiary" (click)="editarAviso(aviso)">Editar</button>
        <button type="button" class="btn-danger" (click)="eliminarAviso(aviso.id)">Eliminar</button>
      </div>
    </div>
  </div>
</section>
