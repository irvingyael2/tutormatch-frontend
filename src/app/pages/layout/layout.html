<div class="app-layout">
  <!-- BARRA DE NAVEGACIÓN PRIVADA -->
  <nav class="topbar">
    <!-- Logo -->
    <div class="logo">
      <span class="logo-icon">
        <svg
          width="28"
          height="28"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M22 10v6M2 10l10-5 10 5-10 5z" />
          <path d="M6 12v5c0 2 4 3 6 3s6-1 6-3v-5" />
        </svg>
      </span>
      <span class="logo-text">TutorMatch</span>
    </div>

    <!-- Menú Dinámico -->
    <ul class="nav-links">
      <li *ngIf="authService.hasRole('ROLE_ALUMNO')">
        <a routerLink="/app/catalogo" routerLinkActive="active-link" class="nav-item">
          <svg class="nav-icon" width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" />
          </svg>
          Catálogo
        </a>
      </li>

      <li *ngIf="authService.hasRole('ROLE_ALUMNO') || authService.hasRole('ROLE_TUTOR')">
        <a routerLink="/app/mi-agenda" routerLinkActive="active-link" class="nav-item">
          <svg class="nav-icon" width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
            <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z" />
            <path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd" />
          </svg>
          Mis Tutorías
        </a>
      </li>

      <li *ngIf="authService.hasRole('ROLE_TUTOR') || authService.hasRole('ROLE_ALUMNO')">
        <a routerLink="/app/historial" routerLinkActive="active-link" class="nav-item">
          <svg class="nav-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
          Historial
        </a>
      </li>

      <li>
        <a routerLink="/app/avisos" routerLinkActive="active-link" class="nav-item">
          <svg class="nav-icon" width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
            <path d="M4 4h12v2H4V4z" />
            <path d="M4 8h12v2H4V8z" />
            <path d="M4 12h12v2H4v-2z" />
          </svg>
          Avisos
        </a>
      </li>

      <li *ngIf="authService.hasRole('ROLE_ADMIN')">
        <a routerLink="/app/admin" routerLinkActive="active-link" class="nav-item admin-link">
          <svg class="nav-icon" width="18" height="18" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M2.166 4.999A11.954 11.954 0 0010 1.944 11.954 11.954 0 0017.834 5c.11.65.166 1.32.166 2.001 0 5.225-3.34 9.67-8 11.317C5.34 16.67 2 12.225 2 7c0-.682.057-1.35.166-2.001zm11.541 3.708a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
          </svg>
          Panel Admin
        </a>
      </li>
    </ul>

    <!-- Acciones de Usuario -->
    <div class="user-actions">
      <!-- Sistema de Notificaciones -->
      <div class="notifications-wrapper">
        <button class="btn-bell" (click)="toggleNotificaciones()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
          <!-- Badge reactivo (solo se muestra si hay > 0 sin leer) -->
          <span class="notification-badge" *ngIf="sinLeer$ | async as sinLeerCount">{{ sinLeerCount }}</span>
        </button>

        <!-- Menú desplegable -->
        <div class="notifications-dropdown" *ngIf="mostrarNotificaciones">
          <div class="dropdown-header">
            <h4>Notificaciones</h4>
          </div>

          <div class="dropdown-body">
            <ng-container *ngIf="notificaciones$ | async as notificaciones">
              <!-- Estado Vacío -->
              <div class="empty-state" *ngIf="notificaciones.length === 0">
                No tienes notificaciones nuevas.
              </div>

              <!-- Lista de Notificaciones -->
              <div class="notification-item" *ngFor="let noti of notificaciones" [class.unread]="!noti.leida">
                <div class="noti-content">
                  <h5 class="noti-title">{{ noti.titulo }}</h5>
                  <p class="noti-desc" [innerHTML]="noti.mensaje"></p>
                  <span class="noti-time">{{ noti.creadoEn | date: 'short' }}</span>
                </div>
                <!-- Botón de check para marcar como leída -->
                <button class="btn-mark-read" *ngIf="!noti.leida" (click)="marcarVista(noti.id, $event)" title="Marcar como leída" [disabled]="(marcandoComoLeidaId$ | async) === noti.id">
                  <ng-container *ngIf="(marcandoComoLeidaId$ | async) !== noti.id; else spinner">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                  </ng-container>

                  <!-- Spinner de carga -->
                  <ng-template #spinner>
                    <svg class="spinner" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M21 12a9 9 0 1 1-6.219-8.56" />
                    </svg>
                  </ng-template>
                </button>
              </div>
            </ng-container>
          </div>
        </div>
      </div>

      <!-- Perfil de Usuario con enlace a la vista de perfil -->
      <a routerLink="/app/perfil" class="user-profile" *ngIf="authService.isLoggedIn" style="text-decoration: none; cursor: pointer; transition: opacity 0.2s;" title="Ir a Mi Perfil" onmouseover="this.style.opacity=0.8" onmouseout="this.style.opacity=1">
        <div class="user-info">
          <span class="user-name">{{ authService.userNombre }}</span>
          <span class="user-email">{{ authService.userEmail }}</span>
        </div>
        <div class="user-avatar">
          <span *ngIf="authService.userNombre">{{ authService.userNombre.charAt(0).toUpperCase() }}</span>
        </div>
      </a>

      <!-- Botón de Logout -->
      <button class="btn-primary btn-logout" (click)="onLogout()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
          <polyline points="16 17 21 12 16 7"></polyline>
          <line x1="21" y1="12" x2="9" y2="12"></line>
        </svg>
        <span>Cerrar Sesión</span>
      </button>
    </div>
  </nav>

  <!-- CONTENEDOR DE VISTAS HIJAS -->
  <main class="app-content">
    <router-outlet></router-outlet>
  </main>
</div>
